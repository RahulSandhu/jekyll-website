###################
# General Options #
###################
theme: beautiful-jekyll-theme
title: Ravneet-Rahul Sandhu Singh
description: Master in Health Data Science - URV
author: Ravneet-Rahul Sandhu Singh
timezone: "Europe/Madrid"
markdown: kramdown
highlighter: rouge
permalink: /:year-:month-:day-:title/
paginate: 5
kramdown:
  input: GFM
title-on-all-pages: true
excerpt_length: 50
feed_show_excerpt: true
feed_show_tags: true
post_search: true
navbar-var-length: false
date_format: "%B %-d, %Y"

#######################
# Site Configuration  #
#######################
url: "http://localhost:4000"
baseurl: ""

##################
# Navigation Bar #
##################
navbar-links:
  Home: "/"  
  About Me: "aboutme"

########################
# Social Network Links #
########################
social-network-links:
  email: "rahulsandhu542001@gmail.com"
  github: "RahulSandhu"
  linkedin: "Ravneet-Rahul Sandhu Singh"

##############################
# Colors & Background Styles #
##############################
page-col: "#FFFFFF"
text-col: "#231F20"
link-col: "#90292A"
hover-col: "#AC162C"
navbar-col: "#90292A"
navbar-text-col: "#FFFFFF"
navbar-border-col: "#AC162C"
footer-col: "#231F20"
footer-text-col: "#F8F8FF"
footer-link-col: "#90292A"
footer-hover-col: "#AC162C"

##############
# Typography #
##############
google-fonts: "Noto+Sans:400,400i,700,700i|Noto+Serif:400,400i,700,700i"

##############
# Custom CSS #
##############
site-css: "/assets/css/custom-urv.css"

#######################
# Default YAML Values #
#######################
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      comments: true
      social-share: false
  - scope:
      path: "pages"
    values:
      layout: "page"

#################################
# Exclude from Production Build #
#################################
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor

#############
# Plugins   #
#############
plugins:
  - jekyll-paginate
  - jekyll-sitemap
